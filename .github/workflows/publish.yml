name: Publish NuGet package

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: Optional package version override (for example 0.2.0 or 0.2.0-preview.1)
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HUSKY: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore --nologo

      - name: Build
        run: dotnet build --configuration Release --no-restore --nologo

      - name: Test
        run: dotnet test --configuration Release --no-build --nologo

      - name: Pack
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          VERSION_INPUT="${{ inputs.package_version }}"
          OUTPUT_DIR="${{ github.workspace }}/artifacts"
          mkdir -p "$OUTPUT_DIR"

          if [[ -n "$VERSION_INPUT" ]]; then
            PACKAGE_VERSION="$VERSION_INPUT"
          else
            PACKAGE_VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/DotnetGitmoji/DotnetGitmoji.csproj)
          fi

          dotnet pack src/DotnetGitmoji/DotnetGitmoji.csproj \
            --configuration Release \
            --no-build \
            --nologo \
            --output "$OUTPUT_DIR" \
            /p:PackageVersion="$PACKAGE_VERSION"

          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg

      - name: Push package to NuGet.org
        run: dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg" --source "https://api.nuget.org/v3/index.json" --api-key "${{ secrets.NUGET_API_KEY }}" --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pack.outputs.package_version }}
          name: v${{ steps.pack.outputs.package_version }}
          generate_release_notes: true
          files: artifacts/*.nupkg
